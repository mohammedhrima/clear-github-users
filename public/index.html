<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>github-management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><b>github</b>-management</div>
      <nav class="nav">
        <a class="nav-link active" href="/">Followers</a>
        <a class="nav-link" href="/repos.html">Repos</a>
      </nav>
      <a id="me" class="me" target="_blank" rel="noopener" hidden></a>
      <button id="refresh" class="ghost" title="Reload">↻</button>
    </header>

    <nav class="tabs" id="tabs" hidden>
      <button class="tab active" data-kind="notFollowingBack">
        Not following back <span class="count">–</span>
      </button>
      <button class="tab" data-kind="fans">
        Fans <span class="count">–</span>
      </button>
      <button class="tab" data-kind="mutuals">
        Mutuals <span class="count">–</span>
      </button>
    </nav>

    <main id="stage">
      <div class="state" id="state">Loading…</div>
      <div class="grid" id="grid" hidden></div>
    </main>

    <div class="toast" id="toast" hidden></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
