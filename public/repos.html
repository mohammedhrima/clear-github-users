<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>clear-github-users · repos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><b>clear</b>-github-users</div>
      <nav class="nav">
        <a class="nav-link" href="/">Followers</a>
        <a class="nav-link active" href="/repos.html">Repos</a>
      </nav>
      <a id="me" class="me" target="_blank" rel="noopener" hidden></a>
      <button id="refresh" class="ghost" title="Reload">↻</button>
    </header>

    <div class="repobar" id="repobar" hidden>
      <input id="filter" class="filter" type="search" placeholder="Filter repos…" />
      <span class="counts">
        <span class="dot pub"></span><b id="pubCount">0</b> public
        <span class="dot priv"></span><b id="privCount">0</b> private
      </span>
    </div>

    <main id="stage">
      <div class="state" id="state">Loading…</div>
      <div class="grid" id="grid" hidden></div>
    </main>

    <div class="toast" id="toast" hidden></div>

    <script src="/repos-app.js" type="module"></script>
  </body>
</html>
